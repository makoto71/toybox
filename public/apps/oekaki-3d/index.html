<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base href="/apps/oekaki-3d/">
  <title>3Dおえかき - tomori</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div class="app-container">
    <!-- 左上メニュー -->
    <div class="menu-container">
      <button class="menu-button" id="menu-button" title="メニュー">⋮</button>
      <div class="menu-dropdown" id="menu-dropdown">
        <button class="menu-item" id="menu-model">モデルをえらぶ</button>
        <button class="menu-item" id="menu-drive">はしる</button>
        <button class="menu-item" id="menu-fullscreen">ぜんがめん</button>
        <button class="menu-item" id="menu-clear">まっしろにもどす</button>
        <button class="menu-item" id="menu-save">ほぞん</button>
      </div>
    </div>

    <!-- メインステージ (Three.js renderer がここに) -->
    <main class="stage" id="stage"></main>

    <!-- 下部: ふとさスライダー -->
    <div class="size-slider-wrap" id="size-slider-wrap">
      <span class="size-slider-icon size-slider-icon-small">●</span>
      <input class="size-slider" id="size-slider" type="range" min="1" max="80" step="1" value="40">
      <span class="size-slider-icon size-slider-icon-large">●</span>
    </div>

    <!-- 左下: ブラシトリガー -->
    <button class="brush-trigger" id="brush-trigger" title="ブラシをえらぶ">
      <span class="brush-trigger-inner" id="brush-trigger-inner">✏️</span>
    </button>

    <!-- 右下: 色トリガー(レインボー) -->
    <button class="color-trigger" id="color-trigger" title="いろをえらぶ">
      <span class="color-trigger-inner"></span>
    </button>

    <!-- ドライブモード退出ボタン (右上) -->
    <button class="drive-exit" id="drive-exit" hidden>もどる</button>
  </div>

  <!-- ブラシ選択オーバーレイ -->
  <div class="overlay" id="brush-overlay" hidden>
    <div class="overlay-backdrop" data-close="brush"></div>
    <div class="overlay-panel brush-panel">
      <div class="overlay-title">ブラシを えらぼう</div>
      <div class="brush-grid" id="brush-grid">
        <button class="brush-card active" data-brush="pen">
          <span class="brush-card-icon">✏️</span>
          <span class="brush-card-label">ペン</span>
        </button>
        <button class="brush-card" data-brush="spray">
          <span class="brush-card-icon">💨</span>
          <span class="brush-card-label">スプレー</span>
        </button>
        <button class="brush-card" data-brush="pattern">
          <span class="brush-card-icon">✦</span>
          <span class="brush-card-label">もよう</span>
        </button>
      </div>
      <!-- もよう選択パネル (もようブラシ選択時だけ表示) -->
      <div id="pattern-shape-panel" hidden>
        <div class="overlay-hint">かたちをえらぼう</div>
        <div class="shape-grid" id="shape-grid"></div>
      </div>
      <button class="overlay-close" data-close="brush">とじる</button>
    </div>
  </div>

  <!-- 色オーバーレイ -->
  <div class="overlay" id="color-overlay" hidden>
    <div class="overlay-backdrop" data-close="color"></div>
    <div class="overlay-panel color-panel">
      <div class="overlay-title">いろを えらぼう</div>
      <div class="overlay-hint">💡 2つのいろを つなぐと グラデーション！</div>
      <div class="color-grid" id="color-grid">
        <!-- Colors generated by JS -->
      </div>
      <button class="overlay-close" data-close="color">とじる</button>
    </div>
  </div>

  <!-- モデル選択オーバーレイ -->
  <div class="overlay" id="model-overlay" hidden>
    <div class="overlay-backdrop" data-close="model"></div>
    <div class="overlay-panel model-panel">
      <div class="overlay-title">モデルを えらぼう</div>
      <div class="overlay-hint">⚠️ かえるとイラストはきえちゃうよ</div>
      <div class="model-grid" id="model-grid">
        <!-- Models generated by JS -->
      </div>
      <button class="overlay-close" data-close="model">とじる</button>
    </div>
  </div>

  <script type="module" src="scripts/app.js"></script>
</body>

</html>
