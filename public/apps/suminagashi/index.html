<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#e8ebe9">
  <base href="/apps/suminagashi/">
  <title>すみながし</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="water"></canvas>

  <h1 class="title" aria-hidden="true">すみながし</h1>

  <p id="hint">ゆびで ちょんと さわってみて<br><span>ながおしすると わが ひろがるよ</span></p>

  <nav class="toolbar">
    <button class="ink sumi active" data-ink="sumi" aria-label="すみ"><span class="dot"></span><span class="lbl">すみ</span></button>
    <button class="ink ai" data-ink="ai" aria-label="あい"><span class="dot"></span><span class="lbl">あい</span></button>
    <button class="ink shu" data-ink="shu" aria-label="しゅ"><span class="dot"></span><span class="lbl">しゅ</span></button>
    <button class="ink kogane" data-ink="kogane" aria-label="こがね"><span class="dot"></span><span class="lbl">こがね</span></button>
    <button class="ink matsu" data-ink="matsu" aria-label="まつ"><span class="dot"></span><span class="lbl">まつ</span></button>
    <button class="ink fuji" data-ink="fuji" aria-label="ふじ"><span class="dot"></span><span class="lbl">ふじ</span></button>
    <button class="ink mizu" data-ink="mizu" aria-label="みず"><span class="dot"></span><span class="lbl">みず</span></button>

    <span class="sep"></span>

    <button class="tool active" data-tool="fude" aria-label="ふで">
      <svg viewBox="0 0 24 24"><path d="M12 2c1 4 2 6 2 9a2.6 2.6 0 0 1-4 0c0-3 1-5 2-9z" fill="currentColor"/><path d="M12 13.5v7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span class="lbl">ふで</span>
    </button>
    <button class="tool" data-tool="kushi" aria-label="くし">
      <svg viewBox="0 0 24 24"><path d="M4 5h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M6 5v13M10 5v15M14 5v15M18 5v13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span class="lbl">くし</span>
    </button>

    <span class="sep"></span>

    <button id="btn-paper" class="tool paper" aria-label="かみにうつす">
      <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M9 9h6M9 13h6M9 17h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span class="lbl">かみ</span>
    </button>
    <button id="btn-reset" class="tool" aria-label="ながす">
      <svg viewBox="0 0 24 24"><path d="M4 13a8 8 0 1 0 2.3-5.6L4 9.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 4.5v5.2h5.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="lbl">ながす</span>
    </button>
    <button id="btn-sound" class="tool" aria-label="おと">
      <svg viewBox="0 0 24 24"><path d="M5 9.5v5h3.5L13 19V5L8.5 9.5H5z" fill="currentColor"/><path class="wave" d="M16 9a4.5 4.5 0 0 1 0 6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      <span class="lbl">おと</span>
    </button>
  </nav>

  <div id="paper-wipe"></div>

  <div id="print-modal">
    <div class="print-sheet">
      <img id="print-img" alt="うつしとった もよう">
      <p class="print-caption">せかいに いちまいの かみ</p>
      <div class="print-actions">
        <button id="btn-save">ほぞん</button>
        <button id="btn-back">ながす</button>
        <button id="btn-cancel">もどる</button>
      </div>
    </div>
  </div>

  <script type="module" src="scripts/app.js"></script>
</body>
</html>
