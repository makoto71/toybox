<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <base href="/apps/oekaki/">
  <title>おえかき - tomori</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <div class="menu-container">
      <button class="menu-button" id="menu-button" title="メニュー">⋮</button>
      <div class="menu-dropdown" id="menu-dropdown">
        <button class="menu-item" id="menu-save">ほぞん</button>
        <button class="menu-item" id="menu-background">はいけい</button>
      </div>
    </div>
    <main class="canvas-area">
      <canvas id="bg-canvas"></canvas>
      <canvas id="drawing-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
    </main>

    <aside class="toolbox" id="toolbox">
      <div class="selectors-area">
        <div class="tool-group selector" id="tool-selector">
          <div class="selected-icon">
            <!-- Active icon will be cloned here by JS -->
          </div>
          <div class="options">
            <button class="btn tool-btn active" id="tool-pen" data-tool="pen" title="ペン">✏️</button>
            <button class="btn tool-btn" id="tool-stamp" data-tool="stamp" title="スタンプ">⭐</button>
            <button class="btn tool-btn" id="tool-eraser" data-tool="eraser" title="けしごむ">🧽</button>
          </div>
        </div>

        <div class="tool-group selector hide-in-stamp" id="size-selector">
          <div class="selected-icon">
            <!-- Active icon will be cloned here by JS -->
          </div>
          <div class="options">
            <button class="btn size-btn small" data-size="small">●</button>
            <button class="btn size-btn medium active" data-size="medium">●</button>
            <button class="btn size-btn large" data-size="large">●</button>
          </div>
        </div>

        <button class="color-trigger" id="color-trigger" title="いろをえらぶ">
          <span class="color-trigger-inner"></span>
        </button>

        <button class="stamp-trigger show-in-stamp" id="stamp-trigger" title="スタンプをえらぶ">
          <span class="stamp-trigger-inner">
            <!-- Current stamp thumbnail inserted by JS -->
          </span>
        </button>
      </div>
    </aside>
  </div>

  <!-- スタンプ選択オーバーレイ -->
  <div class="overlay" id="stamp-overlay" hidden>
    <div class="overlay-backdrop" data-close="stamp"></div>
    <div class="overlay-panel stamp-panel">
      <div class="overlay-title">スタンプをえらぼう</div>
      <div class="stamp-grid" id="stamp-grid">
        <!-- Stamp buttons generated by JS -->
      </div>
      <button class="overlay-close" data-close="stamp">とじる</button>
    </div>
  </div>

  <!-- いろ選択オーバーレイ -->
  <div class="overlay" id="color-overlay" hidden>
    <div class="overlay-backdrop" data-close="color"></div>
    <div class="overlay-panel color-panel">
      <div class="overlay-title">いろをえらぼう</div>
      <div class="overlay-hint">💡 2つのいろを つなぐと グラデーション！</div>
      <div class="color-grid" id="color-grid">
        <!-- Colors generated by JS -->
      </div>
      <button class="overlay-close" data-close="color">とじる</button>
    </div>
  </div>

  <!-- はいけい選択オーバーレイ -->
  <div class="overlay" id="bg-overlay" hidden>
    <div class="overlay-backdrop" data-close="bg"></div>
    <div class="overlay-panel bg-panel">
      <div class="overlay-title">はいけいをえらぼう</div>
      <div class="bg-options">
        <label class="bg-option">
          <input type="file" id="bg-file" accept="image/*" hidden>
          <span class="bg-option-icon">🖼️</span>
          <span class="bg-option-label">がぞうから えらぶ</span>
        </label>
        <button class="bg-option" id="bg-camera" type="button">
          <span class="bg-option-icon">📷</span>
          <span class="bg-option-label">カメラで うつす</span>
        </button>
        <button class="bg-option" id="bg-clear" type="button">
          <span class="bg-option-icon">❌</span>
          <span class="bg-option-label">はいけいを けす</span>
        </button>
      </div>
      <button class="overlay-close" data-close="bg">とじる</button>
    </div>
  </div>

  <!-- カメラオーバーレイ -->
  <div class="overlay" id="camera-overlay" hidden>
    <div class="overlay-backdrop" data-close="camera"></div>
    <div class="overlay-panel camera-panel">
      <div class="overlay-title">カメラ</div>
      <div class="camera-stage">
        <video id="camera-video" autoplay playsinline muted></video>
      </div>
      <div class="camera-controls">
        <button class="overlay-close" data-close="camera" type="button">やめる</button>
        <button class="camera-shutter" id="camera-shutter" type="button" title="とる">
          <span class="camera-shutter-inner"></span>
        </button>
        <span class="camera-spacer"></span>
      </div>
    </div>
  </div>

  <script type="module" src="scripts/app.js"></script>
</body>

</html>
